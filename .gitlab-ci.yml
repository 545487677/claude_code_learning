# GitLab CI 集成示例

# 定义阶段
stages:
  - test
  - maintenance
  - deploy

# 全局变量
variables:
  GIT_DEPTH: 0  # 获取完整历史

# 测试阶段
test:
  stage: test
  image: node:20-alpine
  script:
    - echo "🧪 运行测试..."
    - npm install
    - npm test
  only:
    - merge_requests
    - main

# 分支清理 - 定时任务
cleanup-branches:
  stage: maintenance
  image: alpine/git:latest
  before_script:
    - apk add --no-cache bash
    - git config user.name "GitLab CI"
    - git config user.email "ci@gitlab.com"
  script:
    - chmod +x scripts/cleanup-branches.sh
    - ./scripts/cleanup-branches.sh
  only:
    - schedules  # 只在定时任务时运行
  allow_failure: false
  tags:
    - docker

# 分支清理 - 手动触发
cleanup-branches:manual:
  stage: maintenance
  image: alpine/git:latest
  before_script:
    - apk add --no-cache bash
    - git config user.name "GitLab CI"
    - git config user.email "ci@gitlab.com"
  script:
    - echo "🔍 Dry run mode - 仅显示将要删除的分支"
    - git branch | grep -v "main"
  when: manual  # 手动触发
  tags:
    - docker

# 使用 Claude API 的智能清理
ai-cleanup:
  stage: maintenance
  image: node:20-alpine
  before_script:
    - npm install @anthropic-ai/sdk
  script:
    - node scripts/ai-cleanup.js
  only:
    - schedules
  variables:
    ANTHROPIC_API_KEY: $ANTHROPIC_API_KEY
  tags:
    - docker

# 部署后清理
post-deploy-cleanup:
  stage: deploy
  image: alpine/git:latest
  script:
    - chmod +x scripts/cleanup-branches.sh
    - ./scripts/cleanup-branches.sh
  only:
    - main
  when: on_success  # 只在前面的任务成功后运行
  tags:
    - docker
